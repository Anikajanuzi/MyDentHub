<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyDentHub | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="login-page">
      <section class="login-brand" aria-label="MyDentHub brand">
        <div class="login-logo-frame">
          <img class="login-logo" src="mydenthub-logo.png" alt="MyDentHub logo" />
        </div>
      </section>

      <section class="login-card" aria-labelledby="loginTitle">
        <p class="eyebrow">Secure access</p>
        <h1 id="loginTitle">Welcome to MyDentHub</h1>
        <p class="muted">Sign in or create an account to manage your dental work organizer.</p>

        <section class="auth-panel" aria-labelledby="loginPanelTitle">
          <h2 id="loginPanelTitle">Log in</h2>
          <form id="loginForm" class="auth-form">
            <label>
              <span>Email</span>
              <input id="loginEmailInput" type="email" autocomplete="email" required />
            </label>
            <label>
              <span>Password</span>
              <input id="loginPasswordInput" type="password" autocomplete="current-password" required />
            </label>
            <label class="remember-row">
              <input id="rememberEmailInput" type="checkbox" checked />
              <span>Remember my email on this device</span>
            </label>
            <button id="loginSubmitButton" class="primary-button" type="submit">Log in</button>
          </form>

          <button id="googleLoginButton" class="google-button" type="button">
            <span class="google-icon" aria-hidden="true">G</span>
            <span>Continue with Google</span>
          </button>
        </section>

        <div class="divider"><span>or</span></div>

        <section class="auth-panel" aria-labelledby="createPanelTitle">
          <h2 id="createPanelTitle">Create account</h2>
          <form id="createForm" class="auth-form">
            <label>
              <span>Email</span>
              <input id="createEmailInput" type="email" autocomplete="email" required />
            </label>
            <label>
              <span>Password</span>
              <input id="createPasswordInput" type="password" autocomplete="new-password" required />
            </label>
            <div id="createStrengthWrap" class="strength-wrap">
              <div class="strength-track"><span id="createStrengthBar"></span></div>
              <p id="createStrengthText">Use 8+ characters with uppercase, lowercase, number, and symbol.</p>
            </div>
            <button id="createSubmitButton" class="primary-button" type="submit">Create account</button>
          </form>
        </section>

        <p id="firebaseNotice" class="notice"></p>
      </section>
    </main>

    <script src="firebase-config.js"></script>
    <script defer src="login.js"></script>
  </body>
</html>
